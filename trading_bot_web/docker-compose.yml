services:
  bot:
    build: ./backend
    container_name: trading-bot
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "monitor.py", "--json"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s
